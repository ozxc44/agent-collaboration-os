server {
    listen 80;
    server_name _;
    absolute_redirect off;

    # Enable ETag for all static file responses
    etag on;

    client_max_body_size 20m;

    location = /agent {
        return 301 /agent/;
    }

    location /agent/v1/ {
        proxy_pass http://backend:3000/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /agent;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    location = /agent/api/openapi.json {
        proxy_pass http://backend:3000/api/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /agent/docs {
        return 301 /agent/docs/;
    }

    location /agent/docs/ {
        proxy_pass http://backend:3000/api/docs/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /agent;
    }

    # Static assets: short cache (1 hour) for CSS/JS/images/fonts
    # ETag is enabled globally above; add stale-while-revalidate for cache freshness.
    location ~* /agent/.*\.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2)$ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /agent/index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=60";
    }

    # Dashboard HTML: no-cache to prevent stale content after deploy
    location ~* /agent/.*\.html$ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /agent/index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /agent/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /agent/index.html;
    }
}
