services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: zz_agent
      POSTGRES_USER: zz_agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zz_agent -d zz_agent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../..
      dockerfile: deploy/nas/backend.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      PUBLIC_BASE_URL: http://<your-platform-host>:18080/agent
      CORS_ORIGINS: http://<your-platform-host>:18080,http://127.0.0.1:18080,http://localhost:18080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: zz_agent
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: zz_agent
      DB_SYNCHRONIZE: "false"
      # Durable-inbox lease / redelivery. Enabled by default in production; the
      # TTL can be overridden via .env (e.g. INBOX_LEASE_TTL_MS=3000 for tests).
      INBOX_LEASE_ENABLED: "true"
      INBOX_LEASE_TTL_MS: ${INBOX_LEASE_TTL_MS:-300000}
      JWT_SECRET: ${JWT_SECRET}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      LOG_LEVEL: debug
      DEBUG_LOG_ENABLED: "true"
      LOG_DIR: /var/log/zz-agent
      PROJECT_GIT_DIR: /data/project-git
      DEBUG_LOG_FILE: /var/log/zz-agent/zz-agent-debug.jsonl
      DEBUG_LOG_MAX_BYTES: "20971520"
      DEBUG_LOG_MAX_FILES: "5"
      DEBUG_LOG_API_ENABLED: "true"
      DEBUG_LOG_API_TOKEN: ${DEBUG_LOG_API_TOKEN}
    volumes:
      - ${DEBUG_LOG_HOST_DIR:-/data/zz-agent-platform/logs}:/var/log/zz-agent
      - ${PROJECT_GIT_HOST_DIR:-/data/zz-agent-platform/project-git}:/data/project-git

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "18080:80"
    volumes:
      - ../../dashboard:/usr/share/nginx/html/agent:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # Forgejo/Gitea — external Git gateway (clone/push/PR/LFS/archive).
  # API-compatible with the backend's GiteaSyncService. Data on the big disk.
  gitea:
    image: gitea/gitea:1.22
    container_name: nas-gitea
    restart: unless-stopped
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__server__DOMAIN: "<your-platform-host>"
      GITEA__server__ROOT_URL: "http://<your-platform-host>:23000/"
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__SSH_PORT: "22"
      GITEA__security__INSTALL_LOCK: "true"
    ports:
      - "23000:3000"
      - "22022:22"
    volumes:
      - /data_n004/forgejo/data:/data
      - /data_n004/forgejo/config:/data/gitea/conf
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

volumes:
  postgres-data:
